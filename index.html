<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow • Lead & Follow-up Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .lead-card { transition: all 0.2s ease; }
        .priority-high { border-left: 4px solid #ef4444; }
        .priority-medium { border-left: 4px solid #f59e0b; }
        .priority-low { border-left: 4px solid #22c55e; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <!-- Header -->
    <div class="bg-slate-900 border-b border-slate-800 px-5 py-5 sticky top-0 z-50">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-blue-500 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-users text-white"></i>
                </div>
                <div>
                    <span class="font-bold text-2xl tracking-tighter">LeadFlow</span>
                </div>
            </div>
            <div class="text-right">
                <div class="text-xs text-slate-400">Built by</div>
                <div class="text-blue-400 font-semibold text-sm">Hana</div>
            </div>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-5 pt-6 pb-10">
        
        <!-- Add New Lead -->
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 mb-8">
            <h2 class="font-semibold mb-4 flex items-center gap-x-2">
                <i class="fa-solid fa-user-plus text-blue-400"></i>
                <span>Add New Lead</span>
            </h2>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Name</label>
                    <input id="leadName" type="text" class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3 text-sm" placeholder="Jordan Lee">
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Company</label>
                    <input id="leadCompany" type="text" class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3 text-sm" placeholder="Summit Coffee">
                </div>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Source</label>
                    <input id="leadSource" type="text" class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3 text-sm" placeholder="Instagram / Referral">
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Interest Level</label>
                    <select id="interestLevel" class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3 text-sm">
                        <option value="High">High</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Next Follow-up</label>
                    <input id="nextFollowUp" type="date" class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3 text-sm">
                </div>
            </div>
            
            <div class="mb-4">
                <label class="text-xs text-slate-400 block mb-1">Notes</label>
                <textarea id="leadNotes" rows="2" class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3 text-sm" placeholder="What did they say? Any next steps?"></textarea>
            </div>
            
            <button onclick="addLead()" 
                    class="w-full bg-blue-500 hover:bg-blue-600 py-3.5 rounded-2xl font-semibold flex items-center justify-center gap-x-2">
                <i class="fa-solid fa-plus"></i>
                <span>Add Lead</span>
            </button>
        </div>

        <!-- Leads List -->
        <div>
            <div class="flex items-center justify-between mb-4 px-1">
                <div class="font-semibold">All Leads</div>
                <div id="leadCount" class="text-xs text-blue-400"></div>
            </div>
            
            <div id="leadsList" class="space-y-4"></div>
        </div>

    </div>

    <script>
        let leads = JSON.parse(localStorage.getItem('leadflow_leads')) || [];

        function saveLeads() {
            localStorage.setItem('leadflow_leads', JSON.stringify(leads));
        }

        function renderLeads() {
            const container = document.getElementById('leadsList');
            container.innerHTML = '';
            
            if (leads.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-slate-400 text-sm">
                        No leads yet. Add your first one above.
                    </div>
                `;
                document.getElementById('leadCount').innerHTML = '0 leads';
                return;
            }

            leads.forEach((lead, index) => {
                const priorityClass = lead.interestLevel === 'High' ? 'priority-high' : 
                                     lead.interestLevel === 'Medium' ? 'priority-medium' : 'priority-low';

                const isOverdue = lead.nextFollowUp && new Date(lead.nextFollowUp) < new Date();

                const card = document.createElement('div');
                card.className = `lead-card bg-slate-900 border border-slate-800 rounded-3xl p-5 ${priorityClass}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <div class="font-semibold">${lead.name}</div>
                            <div class="text-xs text-slate-400">${lead.company} • ${lead.source}</div>
                        </div>
                        <div class="flex items-center gap-x-2">
                            <span class="text-xs px-3 py-1 rounded-full ${lead.interestLevel === 'High' ? 'bg-red-900 text-red-300' : lead.interestLevel === 'Medium' ? 'bg-amber-900 text-amber-300' : 'bg-green-900 text-green-300'}">
                                ${lead.interestLevel}
                            </span>
                            <button onclick="deleteLead(${index})" class="text-slate-400 hover:text-red-400 p-1">
                                <i class="fa-solid fa-trash text-xs"></i>
                            </button>
                        </div>
                    </div>
                    
                    ${lead.notes ? `<div class="text-xs bg-slate-950 p-3 rounded-2xl mb-3">${lead.notes}</div>` : ''}
                    
                    <div class="flex items-center justify-between text-xs">
                        <div class="${isOverdue ? 'text-red-400 font-medium' : 'text-slate-400'}">
                            <i class="fa-regular fa-calendar mr-1"></i>
                            Next: ${lead.nextFollowUp || 'Not set'}
                            ${isOverdue ? ' (Overdue)' : ''}
                        </div>
                        
                        <button onclick="logFollowUp(${index})" 
                                class="px-3 py-1 bg-slate-800 hover:bg-slate-700 rounded-2xl flex items-center gap-x-1">
                            <i class="fa-solid fa-check-double"></i>
                            <span>Log Follow-up</span>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
            
            document.getElementById('leadCount').innerHTML = `${leads.length} leads`;
        }

        function addLead() {
            const name = document.getElementById('leadName').value.trim();
            const company = document.getElementById('leadCompany').value.trim();
            const source = document.getElementById('leadSource').value.trim();
            const interestLevel = document.getElementById('interestLevel').value;
            const nextFollowUp = document.getElementById('nextFollowUp').value;
            const notes = document.getElementById('leadNotes').value.trim();

            if (!name) {
                alert("Please enter at least the lead's name");
                return;
            }

            leads.push({
                name: name,
                company: company || "Unknown",
                source: source || "Other",
                interestLevel: interestLevel,
                nextFollowUp: nextFollowUp,
                notes: notes,
                followUps: []
            });

            saveLeads();
            renderLeads();

            // Clear form
            document.getElementById('leadName').value = '';
            document.getElementById('leadCompany').value = '';
            document.getElementById('leadSource').value = '';
            document.getElementById('nextFollowUp').value = '';
            document.getElementById('leadNotes').value = '';
        }

        function logFollowUp(index) {
            const lead = leads[index];
            const note = prompt(`Log follow-up for ${lead.name}:`, "Followed up via DM");
            
            if (note) {
                lead.followUps = lead.followUps || [];
                lead.followUps.push({
                    date: new Date().toISOString().split('T')[0],
                    note: note
                });
                
                // Suggest new follow-up date (7 days later)
                const nextDate = new Date();
                nextDate.setDate(nextDate.getDate() + 7);
                lead.nextFollowUp = nextDate.toISOString().split('T')[0];
                
                saveLeads();
                renderLeads();
            }
        }

        function deleteLead(index) {
            if (confirm('Delete this lead?')) {
                leads.splice(index, 1);
                saveLeads();
                renderLeads();
            }
        }

        function init() {
            renderLeads();
            
            // Set default follow-up date to 7 days from now
            const dateInput = document.getElementById('nextFollowUp');
            if (!dateInput.value) {
                const nextWeek = new Date();
                nextWeek.setDate(nextWeek.getDate() + 7);
                dateInput.value = nextWeek.toISOString().split('T')[0];
            }
        }

        window.onload = init;
    </script>
</body>
</html>
